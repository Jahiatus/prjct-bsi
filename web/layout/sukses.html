<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Material Symbols -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

    <link rel="stylesheet" href="../css/qris.css" />

    <title>Pembayaran Berhasil</title>
  </head>
  <body>
    <div class="overlay">
      <div class="success-popup">
        <!-- Header -->
        <div class="popup-header">
          <h2>Pembayaran Berhasil</h2>

          <button class="close-btn">
            <span class="material-symbols-outlined"> close </span>
          </button>
        </div>

        <!-- Body -->
        <div class="popup-body">
          <div class="success-icon">
            <span class="material-symbols-outlined"> check_circle </span>
          </div>

          <h3>Transaksi Berhasil!</h3>

          <p class="subtitle">
            Pembayaran Anda telah kami terima dan pesanan sedang diproses.
          </p>

          <p class="description">
            E-ticket dan rincian transaksi telah dikirimkan ke email Anda.
          </p>
        </div>

        <!-- Footer -->
        <div class="popup-footer">
          <button class="btn-detail">
            Kembali ke Beranda

            <span class="material-symbols-outlined"> arrow_forward </span>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
