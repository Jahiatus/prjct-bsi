<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadwal Kapal UI</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=calendar_month,directions_boat,local_shipping"
    />

    <link rel="stylesheet" href="../css/jadwal.css">
  </head>
  <body>
    <main class="schedule-widget">
      <nav class="tabs-container">
        <button class="tab-item active" aria-selected="true">
          <span class="material-symbols-outlined">directions_boat</span>
          Penumpang & Kendaraan
        </button>
        <button class="tab-item" aria-selected="false">
          <span class="material-symbols-outlined">local_shipping</span>
          Pengiriman Barang
        </button>
      </nav>

      <section class="schedule-list">

</section>
      <div class="footer-action">
        <button class="btn btn-full-width">
          Lihat Jadwal Lainnya
          <span class="material-symbols-outlined">calendar_month</span>
        </button>
      </div>
    </main>
  </body>
</html>
