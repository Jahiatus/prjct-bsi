<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pesan Berhasil Dikirim</title>

    <link rel="stylesheet" href="../css/success.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="success-container">
      <div class="success-card">
        <div class="check-icon">✓</div>

        <h1>Terima Kasih!</h1>

        <p>
          Pesan Anda telah berhasil dikirim. Tim
          <strong>Ombak Biru</strong> akan segera menghubungi Anda.
        </p>

        <a href="../form/homepage.php" class="btn-home">
          ← Kembali ke Homepage
        </a>

        <div class="countdown">
          Kembali otomatis dalam
          <span id="timer">5</span> detik
        </div>
      </div>
    </div>

    <script>
      let time = 5;

      const timer = document.getElementById("timer");

      setInterval(function () {
        time--;

        timer.innerHTML = time;

        if (time <= 0) {
          window.location.href = "../form/homepage.php";
        }
      }, 1000);
    </script>
  </body>
</html>
