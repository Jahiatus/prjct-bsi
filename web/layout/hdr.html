<!-- INTERACTIVE NAVIGATION SCRIPT -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const navLinks = document.querySelectorAll('.nav-link');
    
    function setActive(activeLink) {
      navLinks.forEach(link => {
        if (link === activeLink) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }

    // Set default active on load
    let defaultActive = navLinks[0]; // 'Schedules' is the first link
    const currentHash = window.location.hash;
    if (currentHash) {
      navLinks.forEach(link => {
        if (link.getAttribute('href') === currentHash) {
          defaultActive = link;
        }
      });
    }
    setActive(defaultActive);

    // Click handler to set active state immediately
    navLinks.forEach(link => {
      link.addEventListener('click', function () {
        setActive(this);
      });
    });

    // Hash change handler to keep state in sync
    window.addEventListener('hashchange', function () {
      const newHash = window.location.hash;
      if (newHash) {
        navLinks.forEach(link => {
          if (link.getAttribute('href') === newHash) {
            setActive(link);
          }
        });
      }
    });
  });
</script>
